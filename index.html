<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="新買醉積分">
  <meta name="theme-color" content="#f97316">
  <!-- 防止 HTML 被快取 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>新買醉餐酒館 · 員工積分手冊</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 圖示 emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍷</text></svg>">
  
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    
    /* 載入畫面 */
    #boot-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 50%, #fecaca 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    
    .boot-card {
      text-align: center;
    }
    
    .boot-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #fb923c, #ec4899);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      animation: bootPulse 1.5s ease-in-out infinite;
      box-shadow: 0 10px 40px rgba(236, 72, 153, 0.3);
    }
    
    .boot-icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    
    .boot-title {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(90deg, #ea580c, #db2777);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 8px;
    }
    
    .boot-sub {
      font-size: 13px;
      color: #c2410c;
      font-weight: 600;
    }
    
    @keyframes bootPulse {
      0%, 100% { transform: scale(1) rotate(3deg); }
      50% { transform: scale(1.1) rotate(-3deg); }
    }
    
    /* 隱藏 boot screen 後 */
    #boot-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- 載入畫面（JS 載完前顯示） -->
  <div id="boot-screen">
    <div class="boot-card">
      <div class="boot-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 22h8M7 10h10M12 15v7M12 15a5 5 0 0 0 5-5V3H7v7a5 5 0 0 0 5 5z"/>
        </svg>
      </div>
      <h1 class="boot-title">新買醉餐酒館</h1>
      <p class="boot-sub">員工積分手冊載入中…</p>
    </div>
  </div>

  <!-- React 應用掛載點 -->
  <div id="root"></div>

  <!-- 應用程式 bundle（用 timestamp 避免瀏覽器快取舊版） -->
  <script>
    // 每次載入頁面時用當前時間戳請求 bundle.js
    // 這樣瀏覽器絕不會用快取的舊版本
    var script = document.createElement('script');
    script.src = 'bundle.js?v=' + Date.now();
    document.body.appendChild(script);
  </script>
  
  <script>
    // React 掛載完成後隱藏載入畫面
    setTimeout(() => {
      const boot = document.getElementById('boot-screen');
      if (boot) {
        boot.classList.add('hidden');
        setTimeout(() => boot.remove(), 300);
      }
    }, 300);
  </script>
</body>
</html>
